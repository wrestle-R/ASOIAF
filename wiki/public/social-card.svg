<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="card-title card-description">
  <title id="card-title">Map of Ice and Fire</title>
  <desc id="card-description">Character journeys across the known world, season by season.</desc>
  <defs>
    <radialGradient id="card-night" cx="28%" cy="48%" r="88%">
      <stop offset="0" stop-color="#1a303b" />
      <stop offset="0.58" stop-color="#0c1b23" />
      <stop offset="1" stop-color="#050c11" />
    </radialGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#e2bd75" />
      <stop offset="1" stop-color="#8b6235" stop-opacity="0" />
    </linearGradient>
    <pattern id="contours" width="180" height="120" patternUnits="userSpaceOnUse">
      <path d="M-20 92C28 50 72 50 118 84s91 27 126-10" fill="none" stroke="#d5ac68" stroke-width="1" opacity="0.075" />
      <path d="M-38 111C22 62 77 65 126 101s83 25 115-2" fill="none" stroke="#d5ac68" stroke-width="1" opacity="0.055" />
    </pattern>
    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#00060a" flood-opacity="0.75" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#card-night)" />
  <rect width="1200" height="630" fill="url(#contours)" />
  <rect x="26" y="26" width="1148" height="578" rx="8" fill="none" stroke="#b88b4e" stroke-width="2" opacity="0.65" />
  <rect x="38" y="38" width="1124" height="554" rx="5" fill="none" stroke="#d8b370" stroke-width="1" opacity="0.24" />

  <image href="brand-mark.svg" x="88" y="107" width="416" height="416" filter="url(#card-shadow)" />

  <g transform="translate(564 175)">
    <text x="0" y="0" fill="#d4b06c" font-family="Georgia, 'Times New Roman', serif" font-size="26" letter-spacing="8">THE KNOWN WORLD</text>
    <text x="-4" y="83" fill="#f2e5c8" font-family="Georgia, 'Times New Roman', serif" font-size="68">Map of</text>
    <text x="-4" y="158" fill="#f2e5c8" font-family="Georgia, 'Times New Roman', serif" font-size="68">Ice and Fire</text>
    <rect x="0" y="194" width="460" height="2" fill="url(#rule)" />
    <text x="0" y="246" fill="#b9aaa0" font-family="Arial, Helvetica, sans-serif" font-size="20" letter-spacing="2">CHARACTER JOURNEYS · SEASON BY SEASON</text>
  </g>

  <g fill="#d8b370" aria-hidden="true">
    <circle cx="70" cy="70" r="4" />
    <circle cx="1130" cy="70" r="4" />
    <circle cx="70" cy="560" r="4" />
    <circle cx="1130" cy="560" r="4" />
  </g>
</svg>
